# Pongo model
description:
  A orang utan model with demographic parameters taken from
  Nater et al. (2017) Morphometric, Behavioral, and Genomic Evidence for a New Orangutan Species.
  Mutation rate 1.5 * 10*-8 ('based on estimates obtained for the present-day mutation rates in humans and chimpanzees')
  Recombination rate see paper page e4
  ABC mode values are used (table S5/1)


time_units: years
generation_time: 25

doi:
- https://doi.org/10.17632/hv2r94yz5n.1


demes:
- name: anc
  description: Ancestral population
  epochs:
  # mean: end_time: 681760, 95HPD: lower: 427878, upper: 921400
  #mean: start_size: 28907 ; 95HPD: start_size: 7522-99855
  - {end_time: 674055, start_size: 35874} 
  # 
- name: NT
  start_time: 3382200 #mean: 2827150, 95HPD: 1712005-3977250
  description: North of Toba ancestral population
  ancestors: [anc]
  epochs:
  - {end_time: 1057388, start_size: 53811} # mean: end_time: 873195, start_size: 29654

- name: NT1
  description: North of Toba population 1
  ancestors: [NT]
  epochs:
  - {end_time: 82635, start_size: 19925} # mean: end_time: 54372, start_size: 26795 ; 95HPD: end_time: 10126-99975, start_size: 3736-197419
  - {end_time: 0, start_size: 2854} # mean: start_size: 3212 ; 95HPD: 517-21691

- name: NT2
  description: North of Toba population 2
  ancestors: [NT]
  epochs:
  - {end_time: 82635, start_size: 19925} # mean: end_time: 54372, start_size: 26795 ; 95HPD: end_time: 10126-99975, start_size: 3736-197419
  - {end_time: 0, start_size: 2854} # mean: start_size: 3212 ; 95HPD: 517-21691

- name: ST
  description: South of Toba
  ancestors: [anc]
  epochs:
  - {end_time: 82635, start_size: 35874} #mean: end_time: 54372, start_size: 28907 ; 95HPD: end_time: 10126-99975, start_size: 7522-99855
  - {end_time: 0, start_size: 2520} #mean: start_size:  2429 ; 95HPD: 524-10756

- name: BO
  description: Borneo ancestral population
  ancestors: [anc]
  epochs:
  # end_time, specifying the time of the start of the bottleneck, is only implicitly given by table S5: adding of TBNDUR (duration of bottleneck) and TBNEND (time since end of bottleneck)
  # 105552 is the addition of the nodes (in the tree, 106k is stated) - see excel sheet
  - {end_time: 105552, start_size: 30655} #mean: start_size: 36257 ; 95HPD: start_size: 5924-266244
  - {end_time: 71969, start_size: 4473} #mean: end_time: 125689, start_size: 3719 ; 95HPD: end_time: 8848-272775, start_size: 523-27948

- name: BO1
  description: Borneo population 1
  ancestors: [BO]
  epochs:
  - {end_time: 0, start_size: 1487} #mean: 1759 ; 95HPD: 207-8002

- name: BO2
  description: Borneo population 2
  ancestors: [BO]
  epochs:
  - {end_time: 0, start_size: 1487} #mean: 1759 ; 95HPD: 207-8002

- name: BO3
  description: Borneo population 3
  ancestors: [BO]
  epochs:
  - {end_time: 0, start_size: 1487} #mean: 1759 ; 95HPD: 207-8002

- name: BO4
  description: Borneo population 4
  ancestors: [BO]
  epochs:
  - {end_time: 0, start_size: 1487} #mean: 1759 ; 95HPD: 207-8002


# since migration rates depend on the dest population sizes, for mean / 95HPD values, the rates would have to be re-calculated
# NmWBO: 6.818
# 

# NmBOST: 0.016
# ST pop size (at time of migration): 35874


# NmSTBO: 0.003 
# BO pop size (at time of migration): 30655

# NmNTST: 0.294
# ST pop size (at time of migration): 35874

# NmSTNT: 0.86
# NT pop size (at time of migration): 19925 + 2 !!! (subpopulations - compare metapopulation size of 92200 in tree!)
# but REM: 'NmNTST therefore has to be divided by the size of the NT subpopulation to obtain the migration rate from ST to NT backwards in time. 
# Importantly, in our model, ST exchanges migrants at the specified rates with each of the two NT subpopulations, but only with one of the Bornean subpopulations (Central/West Kalimantan, for geographic reasons).''
# However: In our model we do not have Bornean subpopulations at the time of migration, only afterwards, so this should not really matter...
# so for getting rates, we simply divide by the subpopulation sizes indicated in S5/1 (see excel sheet)

# NT pop size (at time of migration): 19925

# migration stop between BO and ST: 303118
# migstop: mode: 303118, mean: 253968, 95HPD: lower: 82680, upper: 399903

migrations:
    # mean: start_time: 681760, 95HPD: lower: 427878, upper: 921400
    # migstop/end_time: mode: 303118, mean: 253968, 95HPD: lower: 82680, upper: 399903

    - {source: BO, dest: ST, start_time: 674055, end_time: 303118, rate: 4.46005463566929E-07} 
    - {source: ST, dest: BO, start_time: 674055, end_time: 303118, rate: 9.78633175664655E-08}

    # assumption: end of migration at start of population decline in North Toba?
    # assumption: start of migration at start of Bornean split?
    # start_time: #mean: 681760, 95HPD: 427878-921400
    #mean: end_time: 54372, start_size: 28907 ; 95HDF: end_time: 10126-99975, start_size: 7522-99855

    # there is no division by subpopulations (2), because 'ST exchanges migrants at the specified rates with each of the two NT subpopulations'
    # it is also assumed that the 'full' migration into NT is for both ST subpopulations i.e. (mNTST with mode 0.294 also appears twice in the model,
    # mNT1ST and mNT2ST)
    - {source: NT1, dest: ST, start_time: 674055, end_time: 82635, rate: 8.19535039304232E-06}
    - {source: ST, dest: NT1, start_time: 674055, end_time: 82635, rate: 4.31618569636136E-05}
    - {source: NT2, dest: ST, start_time: 674055, end_time: 82635, rate: 8.19535039304232E-06}
    - {source: ST, dest: NT2, start_time: 674055, end_time: 82635, rate: 4.31618569636136E-05}


    # also for NT within migration we assume that it stops at population decline
    - demes: [NT1, NT2]
      end_time: 82635
      rate: 6.42409033877039E-06
    - demes: [BO1, BO2, BO3, BO4]
      rate: 0.00458507061197041


